<div class="flex justify-between items-start border-b border-slate-800 pb-4 mb-6">
    <div>
        <h4 class="text-xl font-bold text-white">Initiate Technical Discussion</h4>
        <p class="text-xs text-slate-400 mt-1">Provide your details to align on complex architectural or enterprise tech strategies.</p>
    </div>
    <button onclick="closeCaseStudy()" class="cursor-pointer text-slate-400 hover:text-white border border-slate-800 hover:border-slate-700 bg-slate-950 p-1.5 rounded-lg">
        <i data-lucide="x" class="w-4 h-4"></i>
    </button>
</div>

<!-- Input Form Panel (Always Visible on Load) -->
<form id="activeContactForm" onsubmit="submitContactForm(event)" class="space-y-4 text-sm">
    <div>
        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Your Professional Email</label>
        <input type="email" id="senderEmail" required placeholder="name@company.com" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500 transition-colors">
    </div>
    <div>
        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Topic of Technical Consultation</label>
        <textarea id="connectReason" required rows="4" placeholder="Briefly outline your enterprise system scale, data routing constraints, or pipeline orchestration initiatives..." class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500 transition-colors resize-none"></textarea>
    </div>
    <button type="submit" class="w-full cursor-pointer inline-flex items-center justify-center gap-2 rounded-lg bg-cyan-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition-all hover:bg-cyan-400">
        Generate Routed Action Portal <i data-lucide="arrow-right" class="w-4 h-4"></i>
    </button>
</form>
